<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes rotate1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes rotate2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:0.9}}
@keyframes crossglow{0%,100%{filter:drop-shadow(0 0 4px #06b6d4)}50%{filter:drop-shadow(0 0 12px #06b6d4)}}
.ring1{transform-origin:340px 120px;animation:rotate1 8s linear infinite}
.ring2{transform-origin:340px 120px;animation:rotate2 12s linear infinite}
.cross{animation:crossglow 2s ease-in-out infinite}
.dot1{animation:blink 2s ease-in-out infinite}
.dot2{animation:blink 2.4s ease-in-out infinite}
.dot3{animation:blink 1.8s ease-in-out infinite}
.badge{animation:pulse 3s ease-in-out infinite}
</style>
<rect width="680" height="340" fill="#080f18" rx="24"/>
<circle cx="340" cy="120" r="88" fill="#091824" stroke="#06b6d4" stroke-width="1"/>
<g class="ring1">
  <circle cx="340" cy="120" r="72" fill="none" stroke="#0369a1" stroke-width="1" stroke-dasharray="6 4"/>
  <circle cx="340" cy="48" r="5" fill="#06b6d4" class="dot1"/>
  <circle cx="412" cy="156" r="5" fill="#0ea5e9" class="dot2"/>
  <circle cx="268" cy="156" r="5" fill="#0ea5e9" class="dot3"/>
</g>
<g class="ring2">
  <circle cx="340" cy="120" r="52" fill="#091824" stroke="#06b6d4" stroke-width="0.6"/>
  <circle cx="340" cy="192" r="4" fill="#06b6d4" class="dot2"/>
  <circle cx="268" cy="84" r="4" fill="#06b6d4" class="dot1"/>
  <circle cx="412" cy="84" r="4" fill="#06b6d4" class="dot3"/>
</g>
<g class="cross">
  <rect x="322" y="100" width="36" height="40" rx="6" fill="#082030"/>
  <rect x="320" y="114" width="40" height="12" rx="3" fill="#06b6d4"/>
  <rect x="334" y="102" width="12" height="36" rx="3" fill="#06b6d4"/>
</g>
<g class="badge">
  <circle cx="200" cy="90" r="18" fill="#091824" stroke="#06b6d4" stroke-width="1"/>
  <text x="200" y="86" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#06b6d4" font-weight="700">DIAG</text>
  <text x="200" y="97" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#06b6d4" font-weight="700">NOST</text>
</g>
<g style="animation:pulse 3.4s ease-in-out infinite">
  <circle cx="480" cy="90" r="18" fill="#091824" stroke="#06b6d4" stroke-width="1"/>
  <text x="480" y="86" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#06b6d4" font-weight="700">TREAT</text>
  <text x="480" y="97" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#06b6d4" font-weight="700">MENT</text>
</g>
<g style="animation:pulse 2.8s ease-in-out infinite">
  <circle cx="200" cy="150" r="18" fill="#091824" stroke="#0ea5e9" stroke-width="1"/>
  <text x="200" y="146" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#0ea5e9" font-weight="700">BOOK</text>
  <text x="200" y="157" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#0ea5e9" font-weight="700">APPT</text>
</g>
<g style="animation:pulse 3.8s ease-in-out infinite">
  <circle cx="480" cy="150" r="18" fill="#091824" stroke="#0ea5e9" stroke-width="1"/>
  <text x="480" y="146" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#0ea5e9" font-weight="700">CONSULT</text>
  <text x="480" y="157" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#0ea5e9" font-weight="700">ONLINE</text>
</g>
<rect x="175" y="228" width="330" height="1.5" rx="1" fill="#06b6d4" opacity="0.3"/>
<text x="340" y="268" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="3">Aurevia</text>
<text x="340" y="290" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#0891b2" letter-spacing="6">HEALTHCARE · REIMAGINED</text>
</svg>