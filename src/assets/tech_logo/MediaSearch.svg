<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes searchspin{0%,70%{transform:rotate(0deg)}80%{transform:rotate(20deg)}90%{transform:rotate(-10deg)}100%{transform:rotate(0deg)}}
@keyframes cardfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes gifpulse{0%,100%{fill:#00b4d8;opacity:0.5}50%{fill:#00d4f8;opacity:1}}
.search{transform-origin:412px 85px;animation:searchspin 3s ease-in-out infinite}
.c1{animation:cardfloat 3s ease-in-out infinite}
.c2{animation:cardfloat 3.5s ease-in-out infinite}
.c3{animation:cardfloat 2.7s ease-in-out infinite}
.c4{animation:cardfloat 4s ease-in-out infinite}
.gif{animation:gifpulse 1.5s ease-in-out infinite}
.dot{animation:blink 2s ease-in-out infinite}
</style>
<rect width="680" height="340" fill="#080e14" rx="24"/>
<rect x="220" y="25" width="240" height="210" rx="20" fill="#0c1a24" stroke="#00b4d8" stroke-width="1"/>
<g class="c1">
  <rect x="238" y="48" width="94" height="66" rx="6" fill="#0a2535"/>
  <polygon points="270,65 270,100 300,82" fill="#00b4d8" opacity="0.9"/>
  <rect x="238" y="108" width="94" height="4" rx="2" fill="#00b4d8" opacity="0.4"/>
</g>
<g class="c2">
  <rect x="345" y="48" width="96" height="66" rx="6" fill="#0a2535" stroke="#0077a8" stroke-width="0.8"/>
  <rect x="358" y="58" width="70" height="10" rx="5" fill="#00b4d8" opacity="0.7"/>
  <rect x="358" y="74" width="52" height="8" rx="4" fill="#005f85" opacity="0.8"/>
  <rect x="358" y="88" width="62" height="8" rx="4" fill="#005f85" opacity="0.8"/>
</g>
<g class="c3">
  <rect x="235" y="130" width="100" height="75" rx="8" fill="#0a2535" stroke="#0077a8" stroke-width="0.8"/>
  <rect x="248" y="143" width="74" height="42" rx="5" fill="#003d52"/>
  <circle cx="262" cy="155" r="8" fill="#00b4d8" opacity="0.6"/>
  <polygon points="255,175 275,155 295,175" fill="#00b4d8" opacity="0.5"/>
  <text x="285" y="148" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" class="gif">GIF</text>
</g>
<g class="c4">
  <rect x="345" y="130" width="96" height="75" rx="8" fill="#0a2535" stroke="#0077a8" stroke-width="0.8"/>
  <circle cx="393" cy="162" r="20" fill="#003d52" stroke="#00b4d8" stroke-width="1"/>
  <path d="M385 162 L391 168 L403 154" fill="none" stroke="#00b4d8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<g class="search">
  <circle cx="412" cy="85" r="28" fill="#080e14" stroke="#00b4d8" stroke-width="1.8"/>
  <circle cx="412" cy="85" r="18" fill="none" stroke="#00b4d8" stroke-width="1.2"/>
  <line x1="424" y1="97" x2="436" y2="110" stroke="#00b4d8" stroke-width="3.5" stroke-linecap="round"/>
</g>
<circle cx="210" cy="60" r="2.5" fill="#00b4d8" class="dot"/>
<rect x="195" y="248" width="290" height="1.5" rx="1" fill="#00b4d8" opacity="0.3"/>
<text x="340" y="280" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="2">MediaSearch</text>
<text x="340" y="300" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#0099bb" letter-spacing="5">FIND · IMAGES · VIDEOS · GIFS</text>
</svg>
