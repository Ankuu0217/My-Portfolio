@keyframes glowbox{0%,100%{filter:drop-shadow(0 0 3px #f59e0b)}50%{filter:drop-shadow(0 0 10px #f59e0b)}}
@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}
