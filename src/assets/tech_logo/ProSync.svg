<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes rotate1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes nodepulse{0%,100%{r:10;opacity:0.8}50%{r:13;opacity:1}}
@keyframes centerglow{0%,100%{filter:drop-shadow(0 0 4px #7c3aed)}50%{filter:drop-shadow(0 0 14px #7c3aed)}}
@keyframes linefade{0%,100%{opacity:0.3}50%{opacity:0.9}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
.outerring{transform-origin:340px 120px;animation:rotate1 10s linear infinite}
.innerring{transform-origin:340px 120px;animation:orbit 6s linear infinite}
.center{animation:centerglow 2s ease-in-out infinite}
.n1{animation:nodepulse 2s ease-in-out infinite}
.n2{animation:nodepulse 2.4s ease-in-out infinite}
.n3{animation:nodepulse 2.8s ease-in-out infinite}
.n4{animation:nodepulse 1.8s ease-in-out infinite}
.n5{animation:nodepulse 3s ease-in-out infinite}
.n6{animation:nodepulse 2.2s ease-in-out infinite}
.edge{animation:linefade 2.5s ease-in-out infinite}
</style>
<rect width="680" height="340" fill="#080d18" rx="24"/>
<circle cx="340" cy="120" r="90" fill="#0a1220" stroke="#7c3aed" stroke-width="1"/>
<g class="outerring">
  <circle cx="340" cy="120" r="75" fill="none" stroke="#4f1f9e" stroke-width="0.8" stroke-dasharray="5 5"/>
  <circle cx="340" cy="45" r="6" fill="#7c3aed" class="n1"/>
  <circle cx="405" cy="82" r="6" fill="#5b21b6" class="n2"/>
  <circle cx="405" cy="158" r="6" fill="#5b21b6" class="n3"/>
  <circle cx="340" cy="195" r="6" fill="#7c3aed" class="n4"/>
  <circle cx="275" cy="158" r="6" fill="#5b21b6" class="n5"/>
  <circle cx="275" cy="82" r="6" fill="#5b21b6" class="n6"/>
</g>
<g class="innerring">
  <circle cx="340" cy="120" r="50" fill="none" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="3 6"/>
  <circle cx="340" cy="70" r="4" fill="#a855f7" opacity="0.8"/>
  <circle cx="383" cy="145" r="4" fill="#a855f7" opacity="0.8"/>
  <circle cx="297" cy="145" r="4" fill="#a855f7" opacity="0.8"/>
</g>
<line x1="340" y1="51" x2="399" y2="86" stroke="#7c3aed" stroke-width="1.2" class="edge"/>
<line x1="405" y1="92" x2="405" y2="148" stroke="#7c3aed" stroke-width="1.2" style="animation:linefade 2s ease-in-out infinite"/>
<line x1="399" y1="154" x2="346" y2="189" stroke="#7c3aed" stroke-width="1.2" style="animation:linefade 3s ease-in-out infinite"/>
<line x1="334" y1="189" x2="281" y2="154" stroke="#7c3aed" stroke-width="1.2" style="animation:linefade 2.2s ease-in-out infinite"/>
<line x1="275" y1="148" x2="275" y2="92" stroke="#7c3aed" stroke-width="1.2" style="animation:linefade 2.7s ease-in-out infinite"/>
<line x1="281" y1="86" x2="334" y2="51" stroke="#7c3aed" stroke-width="1.2" style="animation:linefade 1.8s ease-in-out infinite"/>
<g class="center">
  <circle cx="340" cy="120" r="22" fill="#7c3aed"/>
  <path d="M332 120 L338 126 L350 114" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<rect x="180" y="228" width="320" height="1.5" rx="1" fill="#7c3aed" opacity="0.4"/>
<text x="340" y="268" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="4">ProSync</text>
<text x="340" y="290" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#7c5cc4" letter-spacing="6">PROJECT · MANAGEMENT</text>
</svg>